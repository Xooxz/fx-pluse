server:
  port: 8081

spring:
  application:
    name: fx-stream-service
  profiles:
    active: local

  reactor:
    context-propagation: auto

  data:
    redis:
      host: localhost
      port: 16379
      password: fx_steam12!@
      database: 0

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans