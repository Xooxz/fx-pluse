server:
  port: 8080

spring:
  application:
    name: fx-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: fx-stream-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/rates/**
              filters:
                - StripPrefix=2

#            - id: fx-rate-history-service
#              uri: http://localhost:8082
#              predicates:
#                - Path=/api/rates/history/**
#              filters:
#                - StripPrefix=2
#
#            - id: fx-rate-command-service
#              uri: http://localhost:8083
#              predicates:
#                - Path=/api/rates/command/**
#              filters:
#                - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%20.20thread] [%X{traceId}] [%-5level] %logger{36} - %msg%n"