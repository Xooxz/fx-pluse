server:
  port: 8082

spring:
  application:
    name: fx-notification-service

  data:
    redis:
      host: localhost
      port: 16379
      password: fx_steam12!@
      database: 0

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fx-notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: "com.xooxz.notification.infrastructure.kafka.RateUpdatedEvent"
        spring.json.use.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info